<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Antrian - Klikka Photobooth</title>
  <style>
    :root {
      --pink: #E91E8C; --dark: #1a1a2e; --green: #10b981; --amber: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, var(--dark) 0%, #2d1b4e 100%); color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .queue-logo { font-size: 28px; font-weight: 900; letter-spacing: 2px; color: var(--pink); margin-bottom: 8px; }
    .queue-logo span { color: #fff; }
    .queue-card { background: rgba(255,255,255,.08); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.15); border-radius: 20px; padding: 32px; max-width: 380px; width: 100%; text-align: center; }
    .queue-ticket-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: .7; margin-bottom: 4px; }
    .queue-ticket-no { font-size: 48px; font-weight: 900; letter-spacing: 4px; color: var(--pink); font-family: 'Courier New', monospace; line-height: 1; }
    .queue-booth-name { font-size: 16px; font-weight: 700; margin: 8px 0 4px; text-transform: uppercase; letter-spacing: 1px; }
    .queue-theme { font-size: 13px; opacity: .7; margin-bottom: 20px; }
    .queue-pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .queue-stat { background: rgba(255,255,255,.06); border-radius: 12px; padding: 14px 10px; }
    .queue-stat-val { font-size: 26px; font-weight: 800; line-height: 1; }
    .queue-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; opacity: .6; margin-top: 3px; }
    .badge { padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 700; display: inline-block; margin-bottom: 16px; border: 1px solid transparent; }
    .badge.waiting { background: rgba(245,158,11,.2); color: #fbbf24; border-color: rgba(245,158,11,.3); }
    .badge.called { background: rgba(16,185,129,.2); color: #34d399; border-color: rgba(16,185,129,.3); }
    .error-msg { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; padding: 15px; border-radius: 12px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="queue-logo">KLIKKA<span>.</span></div>
  <div class="queue-card" id="queue-container">
    <p>Memuat data antrian...</p>
  </div>

  <script>
    // MASUKKAN URL DEPLOY WEB APP DI SINI
    const API_URL = 'https://script.google.com/macros/s/AKfycbx-ShUza2gI6nCwatpk16L1QGdF1TkQmqTiVZfox8vndGxizjjOk_yIDYpmaXz4TORNqA/exec'; 

    function getParams() {
      const p = new URLSearchParams(window.location.search);
      return { booth: p.get('booth'), ticket: p.get('ticket') };
    }

    async function fetchQueueData() {
      const { booth, ticket } = getParams();
      if (!booth || !ticket) {
        document.getElementById('queue-container').innerHTML = `<div class="error-msg">Akses tidak valid. Harap scan QR Code dari tiket kamu.</div>`;
        return;
      }

      try {
        const res = await fetch(`${API_URL}?action=getQueuePage&boothId=${booth}&ticketNumber=${ticket}`);
        const data = await res.json();

        if (data.error) {
          document.getElementById('queue-container').innerHTML = `<div class="error-msg">${data.error}</div>`;
          return;
        }

        let statusBadge = data.myStatus === 'waiting' 
          ? `<div class="badge waiting">⏳ MENUNGGU</div>` 
          : `<div class="badge called">✅ DIPANGGIL / SELESAI</div>`;

        let positionInfo = data.myStatus === 'waiting' ? data.myPosition : '-';

        document.getElementById('queue-container').innerHTML = `
          ${statusBadge}
          <div class="queue-ticket-label">TICKET NUMBER</div>
          <div class="queue-ticket-no">${data.ticketNumber}</div>
          <div class="queue-booth-name">${data.boothName}</div>
          <div class="queue-theme">${data.theme}</div>
          
          <div class="queue-pos-grid">
            <div class="queue-stat">
              <div class="queue-stat-val" style="color:var(--pink)">${positionInfo}</div>
              <div class="queue-stat-label">Posisi Kamu</div>
            </div>
            <div class="queue-stat">
              <div class="queue-stat-val">${data.activeNumber}</div>
              <div class="queue-stat-label">Nomor Aktif</div>
            </div>
          </div>
          <div style="font-size: 11px; opacity: 0.5;">Sisa antrian menunggu: ${data.waitCount}</div>
          <div style="font-size: 10px; opacity: 0.3; margin-top: 15px;">Diperbarui: ${data.updatedAt}</div>
        `;
      } catch (err) {
        console.error(err);
      }
    }

    // Auto-refresh data tiap 4 detik
    if(getParams().booth) {
      fetchQueueData();
      setInterval(fetchQueueData, 4000);
    }
  </script>
</body>
</html>
